<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="640" viewBox="0 0 900 640">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title  { font-size: 13px; font-weight: 600; }
      .sub    { font-size: 10px; }
      .label  { font-size: 10px; fill: #5F5E5A; }
      .lane   { font-size: 11px; font-weight: 600; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="640" fill="#ffffff"/>

  <!-- Lane backgrounds -->
  <rect x="10" y="10" width="435" height="620" rx="10" fill="#FAFAFA" stroke="#E5E3DC" stroke-width="1"/>
  <rect x="455" y="10" width="435" height="620" rx="10" fill="#F5F3FE" stroke="#C4C0F5" stroke-width="1"/>

  <!-- Lane labels -->
  <text class="lane" x="227" y="30" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Real-time ingestion</text>
  <text class="lane" x="672" y="30" text-anchor="middle" dominant-baseline="central" fill="#7F77DD">Historical import</text>

  <!-- ═══════════════════════════════════════════
       LEFT LANE: Real-time ingestion
  ═══════════════════════════════════════════ -->

  <!-- ROW 1: 4 ingestion sources -->
  <text class="label" x="227" y="52" text-anchor="middle" dominant-baseline="central">Ingestion channels</text>

  <rect x="26" y="62" width="95" height="44" rx="7" fill="#FAECE7" stroke="#D85A30" stroke-width="0.75"/>
  <text class="title" x="73" y="84" text-anchor="middle" dominant-baseline="central" fill="#712B13">Camera scan</text>

  <rect x="130" y="62" width="95" height="44" rx="7" fill="#FAECE7" stroke="#D85A30" stroke-width="0.75"/>
  <text class="title" x="177" y="78" text-anchor="middle" dominant-baseline="central" fill="#712B13">Gmail /</text>
  <text class="title" x="177" y="96" text-anchor="middle" dominant-baseline="central" fill="#712B13">Outlook</text>

  <rect x="234" y="62" width="95" height="44" rx="7" fill="#FAECE7" stroke="#D85A30" stroke-width="0.75"/>
  <text class="title" x="281" y="78" text-anchor="middle" dominant-baseline="central" fill="#712B13">Forward</text>
  <text class="title" x="281" y="96" text-anchor="middle" dominant-baseline="central" fill="#712B13">email</text>

  <rect x="338" y="62" width="95" height="44" rx="7" fill="#FAECE7" stroke="#D85A30" stroke-width="0.75"/>
  <text class="title" x="385" y="78" text-anchor="middle" dominant-baseline="central" fill="#712B13">Browser</text>
  <text class="title" x="385" y="96" text-anchor="middle" dominant-baseline="central" fill="#712B13">ext.</text>

  <!-- Collector lines -->
  <line x1="73"  y1="106" x2="73"  y2="118" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="177" y1="106" x2="177" y2="118" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="281" y1="106" x2="281" y2="118" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="385" y1="106" x2="385" y2="118" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="73"  y1="118" x2="385" y2="118" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="227" y1="118" x2="227" y2="135" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>

  <!-- AI Processing -->
  <rect x="77" y="137" width="300" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text class="title" x="227" y="157" text-anchor="middle" dominant-baseline="central" fill="#3C3489">AI processing</text>
  <text class="sub"   x="227" y="177" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Claude Vision OCR · parse · dedup · confidence</text>

  <line x1="227" y1="189" x2="227" y2="203" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Push Notification -->
  <rect x="102" y="205" width="250" height="52" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.75"/>
  <text class="title" x="227" y="224" text-anchor="middle" dominant-baseline="central" fill="#633806">Push notification fired</text>
  <text class="sub"   x="227" y="244" text-anchor="middle" dominant-baseline="central" fill="#854F0B">within 30–60 seconds</text>

  <!-- Fan arrows -->
  <line x1="227" y1="257" x2="100"  y2="274" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="227" y1="257" x2="227"  y2="274" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="227" y1="257" x2="354"  y2="274" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Outcomes -->
  <rect x="26"  y="276" width="148" height="52" rx="7" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.75"/>
  <text class="title" x="100" y="296" text-anchor="middle" dominant-baseline="central" fill="#085041">User keeps</text>
  <text class="sub"   x="100" y="315" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Tap ✓</text>

  <rect x="153" y="276" width="148" height="52" rx="7" fill="#F1EFE8" stroke="#888780" stroke-width="0.75"/>
  <text class="title" x="227" y="296" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Dismisses</text>
  <text class="sub"   x="227" y="315" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Tap ✗ — deleted</text>

  <rect x="280" y="276" width="148" height="52" rx="7" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text class="title" x="354" y="296" text-anchor="middle" dominant-baseline="central" fill="#3C3489">No action</text>
  <text class="sub"   x="354" y="315" text-anchor="middle" dominant-baseline="central" fill="#534AB7">24hr → auto-ingest</text>

  <!-- Converge to stored -->
  <line x1="100" y1="328" x2="190" y2="356" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="354" y1="328" x2="264" y2="356" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Receipt Stored -->
  <rect x="77" y="358" width="300" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.75"/>
  <text class="title" x="227" y="380" text-anchor="middle" dominant-baseline="central" fill="#085041">Receipt stored in database</text>

  <!-- Fan to outputs -->
  <line x1="227" y1="402" x2="120"  y2="424" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="227" y1="402" x2="227"  y2="424" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="227" y1="402" x2="334"  y2="424" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>

  <text class="label" x="227" y="420" text-anchor="middle" dominant-baseline="central">Analytics outputs</text>

  <rect x="26"  y="426" width="125" height="40" rx="7" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.75"/>
  <text class="title" x="88"  y="446" text-anchor="middle" dominant-baseline="central" fill="#085041">Analytics</text>

  <rect x="164" y="426" width="125" height="40" rx="7" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.75"/>
  <text class="title" x="226" y="446" text-anchor="middle" dominant-baseline="central" fill="#085041">AI chat</text>

  <rect x="302" y="426" width="125" height="40" rx="7" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.75"/>
  <text class="title" x="364" y="446" text-anchor="middle" dominant-baseline="central" fill="#085041">Weekly digest</text>

  <!-- ═══════════════════════════════════════════
       RIGHT LANE: Historical import
  ═══════════════════════════════════════════ -->

  <!-- ROW 1: 4 historical sources -->
  <text class="label" x="672" y="52" text-anchor="middle" dominant-baseline="central">Historical sources</text>

  <rect x="467" y="62" width="105" height="44" rx="7" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text class="title" x="519" y="78" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Amazon</text>
  <text class="sub"   x="519" y="96" text-anchor="middle" dominant-baseline="central" fill="#534AB7">CSV export</text>

  <rect x="583" y="62" width="105" height="44" rx="7" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text class="title" x="635" y="78" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Camera roll</text>
  <text class="sub"   x="635" y="96" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Bulk scan</text>

  <rect x="699" y="62" width="105" height="44" rx="7" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text class="title" x="751" y="78" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Drive /</text>
  <text class="sub"   x="751" y="96" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Dropbox</text>

  <rect x="815" y="62" width="68" height="44" rx="7" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text class="title" x="849" y="78" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Plaid</text>
  <text class="sub"   x="849" y="96" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Bank</text>

  <!-- Collector -->
  <line x1="519" y1="106" x2="519" y2="118" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="635" y1="106" x2="635" y2="118" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="751" y1="106" x2="751" y2="118" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="849" y1="106" x2="849" y2="118" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="519" y1="118" x2="849" y2="118" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="672" y1="118" x2="672" y2="135" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Background job queue -->
  <rect x="547" y="137" width="250" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text class="title" x="672" y="156" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Background job queue</text>
  <text class="sub"   x="672" y="176" text-anchor="middle" dominant-baseline="central" fill="#534AB7">SQS · batch processing · priority lanes</text>

  <!-- Decision diamond - has line items? -->
  <line x1="672" y1="189" x2="672" y2="208" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>

  <polygon points="672,210 730,242 672,274 614,242" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.75"/>
  <text class="sub" x="672" y="236" text-anchor="middle" dominant-baseline="central" fill="#633806">Has line</text>
  <text class="sub" x="672" y="252" text-anchor="middle" dominant-baseline="central" fill="#633806">items?</text>

  <!-- Yes branch → AI OCR -->
  <text class="label" x="600" y="267" text-anchor="middle" fill="#5F5E5A">Yes</text>
  <line x1="614" y1="242" x2="560" y2="278" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>

  <!-- No branch (Plaid) → straight to stored -->
  <text class="label" x="748" y="267" text-anchor="middle" fill="#5F5E5A">No (Plaid)</text>
  <line x1="730" y1="242" x2="785" y2="278" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>

  <!-- AI Batch OCR (left of diamond) -->
  <rect x="467" y="280" width="186" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text class="title" x="560" y="300" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Claude Vision batch</text>
  <text class="sub"   x="560" y="319" text-anchor="middle" dominant-baseline="central" fill="#534AB7">OCR · parse · dedup</text>

  <!-- Plaid direct path (right of diamond) -->
  <rect x="761" y="280" width="117" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.75"/>
  <text class="title" x="819" y="299" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Merchant</text>
  <text class="sub"   x="819" y="318" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">total only</text>

  <!-- Converge both to Import Review -->
  <line x1="560" y1="332" x2="600" y2="358" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="819" y1="332" x2="745" y2="358" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Import Review -->
  <rect x="547" y="360" width="250" height="52" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.75"/>
  <text class="title" x="672" y="379" text-anchor="middle" dominant-baseline="central" fill="#633806">Import review</text>
  <text class="sub"   x="672" y="399" text-anchor="middle" dominant-baseline="central" fill="#854F0B">one notification when complete · user confirms</text>

  <line x1="672" y1="412" x2="672" y2="426" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Historical stored -->
  <rect x="547" y="428" width="250" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.75"/>
  <text class="title" x="672" y="446" text-anchor="middle" dominant-baseline="central" fill="#085041">Historical data stored</text>
  <text class="sub"   x="672" y="462" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Feeds analytics · price history · trends</text>

  <!-- Cross-lane connector: historical stored feeds same outputs -->
  <line x1="547" y1="450" x2="430" y2="450" stroke="#B4B2A9" stroke-width="0.75" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text class="label" x="488" y="444" text-anchor="middle" fill="#5F5E5A">feeds same</text>
  <text class="label" x="488" y="456" text-anchor="middle" fill="#5F5E5A">analytics</text>

  <!-- Progress indicator note -->
  <rect x="547" y="488" width="250" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.75"/>
  <text class="title" x="672" y="507" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Progress indicator</text>
  <text class="sub"   x="672" y="524" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Processing 47 of 132 receipts…</text>

  <line x1="672" y1="472" x2="672" y2="486" stroke="#B4B2A9" stroke-width="0.75" stroke-dasharray="3 2"/>

  <!-- LEGEND -->
  <rect x="26" y="488" width="400" height="130" rx="8" fill="#F8F8F6" stroke="#E5E3DC" stroke-width="0.75"/>
  <text class="label" x="38" y="506" dominant-baseline="central" font-weight="600">Legend</text>
  <rect x="38" y="518" width="14" height="14" rx="3" fill="#FAECE7" stroke="#D85A30" stroke-width="0.75"/>
  <text class="label" x="58" y="525" dominant-baseline="central">Real-time ingestion sources</text>
  <rect x="38" y="540" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text class="label" x="58" y="547" dominant-baseline="central">Historical / AI processing</text>
  <rect x="38" y="562" width="14" height="14" rx="3" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.75"/>
  <text class="label" x="58" y="569" dominant-baseline="central">Notification / review / decision</text>
  <rect x="38" y="584" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.75"/>
  <text class="label" x="58" y="591" dominant-baseline="central">Storage / outputs</text>
  <rect x="38" y="606" width="14" height="14" rx="3" fill="#F1EFE8" stroke="#888780" stroke-width="0.75"/>
  <text class="label" x="58" y="613" dominant-baseline="central">Neutral / no-action paths</text>

  <line x1="220" y1="525" x2="250" y2="525" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>
  <text class="label" x="258" y="525" dominant-baseline="central">Sync / real-time flow</text>
  <line x1="220" y1="545" x2="250" y2="545" stroke="#B4B2A9" stroke-width="0.75" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text class="label" x="258" y="545" dominant-baseline="central">Async / cross-lane connection</text>
</svg>