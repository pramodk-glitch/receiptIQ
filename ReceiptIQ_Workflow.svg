<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="490" viewBox="0 0 680 490">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 14px; font-weight: 600; }
      .sub   { font-size: 11px; }
      .label { font-size: 11px; fill: #5F5E5A; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="490" fill="#ffffff"/>

  <!-- Section label -->
  <text class="label" x="340" y="16" text-anchor="middle" dominant-baseline="central">Ingestion channels</text>

  <!-- ── ROW 1: Ingestion sources ── -->
  <!-- Camera scan -->
  <rect x="42" y="26" width="138" height="44" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.75"/>
  <text class="title" x="111" y="48" text-anchor="middle" dominant-baseline="central" fill="#712B13">Camera scan</text>

  <!-- Gmail / Outlook -->
  <rect x="195" y="26" width="138" height="44" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.75"/>
  <text class="title" x="264" y="48" text-anchor="middle" dominant-baseline="central" fill="#712B13">Gmail / Outlook</text>

  <!-- Forward email -->
  <rect x="348" y="26" width="138" height="44" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.75"/>
  <text class="title" x="417" y="48" text-anchor="middle" dominant-baseline="central" fill="#712B13">Forward email</text>

  <!-- Browser ext. -->
  <rect x="501" y="26" width="138" height="44" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.75"/>
  <text class="title" x="570" y="48" text-anchor="middle" dominant-baseline="central" fill="#712B13">Browser ext.</text>

  <!-- Collector lines -->
  <line x1="111" y1="70" x2="111" y2="84" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="264" y1="70" x2="264" y2="84" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="417" y1="70" x2="417" y2="84" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="570" y1="70" x2="570" y2="84" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="111" y1="84" x2="570" y2="84" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="340" y1="84" x2="340" y2="103" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── ROW 2: AI Processing ── -->
  <rect x="190" y="105" width="300" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text class="title" x="340" y="126" text-anchor="middle" dominant-baseline="central" fill="#3C3489">AI processing</text>
  <text class="sub"   x="340" y="147" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Vision OCR · parse · deduplicate · confidence score</text>

  <line x1="340" y1="161" x2="340" y2="173" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── ROW 3: Push Notification ── -->
  <rect x="215" y="175" width="250" height="56" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.75"/>
  <text class="title" x="340" y="196" text-anchor="middle" dominant-baseline="central" fill="#633806">Push notification fired</text>
  <text class="sub"   x="340" y="217" text-anchor="middle" dominant-baseline="central" fill="#854F0B">within 30–60 seconds of ingestion</text>

  <!-- Fan arrows to outcomes -->
  <line x1="340" y1="231" x2="145" y2="248" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="340" y1="231" x2="340" y2="248" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="340" y1="231" x2="535" y2="248" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── ROW 4: Outcomes ── -->
  <!-- User keeps -->
  <rect x="60" y="250" width="170" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.75"/>
  <text class="title" x="145" y="271" text-anchor="middle" dominant-baseline="central" fill="#085041">User keeps</text>
  <text class="sub"   x="145" y="291" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Tap ✓ in notification</text>

  <!-- User dismisses -->
  <rect x="255" y="250" width="170" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.75"/>
  <text class="title" x="340" y="271" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">User dismisses</text>
  <text class="sub"   x="340" y="291" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Tap ✗ — receipt deleted</text>

  <!-- No action 24hr -->
  <rect x="450" y="250" width="170" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text class="title" x="535" y="271" text-anchor="middle" dominant-baseline="central" fill="#3C3489">No action — 24 hr</text>
  <text class="sub"   x="535" y="291" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Auto-ingested (silence = keep)</text>

  <!-- Arrows from keep and auto to stored -->
  <line x1="145" y1="306" x2="230" y2="328" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="535" y1="306" x2="450" y2="328" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── ROW 5: Receipt stored ── -->
  <rect x="190" y="330" width="300" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.75"/>
  <text class="title" x="340" y="352" text-anchor="middle" dominant-baseline="central" fill="#085041">Receipt stored in database</text>

  <!-- Fan arrows to outputs -->
  <line x1="340" y1="374" x2="163" y2="398" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="340" y1="374" x2="340" y2="398" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="340" y1="374" x2="517" y2="398" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Section label -->
  <text class="label" x="340" y="394" text-anchor="middle" dominant-baseline="central">Analytics outputs</text>

  <!-- ── ROW 6: Outputs ── -->
  <rect x="86" y="400" width="155" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.75"/>
  <text class="title" x="163" y="422" text-anchor="middle" dominant-baseline="central" fill="#085041">Analytics</text>

  <rect x="263" y="400" width="155" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.75"/>
  <text class="title" x="340" y="422" text-anchor="middle" dominant-baseline="central" fill="#085041">AI chat</text>

  <rect x="440" y="400" width="155" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.75"/>
  <text class="title" x="517" y="422" text-anchor="middle" dominant-baseline="central" fill="#085041">Weekly digest</text>
</svg>