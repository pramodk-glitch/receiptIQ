<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="600" viewBox="0 0 680 600">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 13px; font-weight: 600; }
      .sub   { font-size: 10px; }
      .zone  { font-size: 11px; font-weight: 500; }
      .head  { font-size: 13px; font-weight: 600; fill: #2C2C2A; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="600" fill="#ffffff"/>

  <!-- Page title -->
  <text class="head" x="340" y="14" text-anchor="middle" dominant-baseline="central">AWS infrastructure</text>

  <!-- AWS outer container -->
  <rect x="28" y="22" width="624" height="422" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>

  <!-- ── User-facing zone ── -->
  <text class="zone" x="50" y="45" dominant-baseline="central" fill="#D85A30">User-facing layer</text>
  <rect x="44" y="53" width="592" height="100" rx="8" fill="none" stroke="#D85A30" stroke-width="0.75" stroke-dasharray="6 3"/>

  <rect x="62" y="67" width="240" height="70" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.75"/>
  <text class="title" x="182" y="95" text-anchor="middle" dominant-baseline="central" fill="#712B13">Web app</text>
  <text class="sub"   x="182" y="115" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Next.js 14 · Vercel · PWA</text>

  <rect x="378" y="67" width="240" height="70" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.75"/>
  <text class="title" x="498" y="95" text-anchor="middle" dominant-baseline="central" fill="#712B13">Mobile app</text>
  <text class="sub"   x="498" y="115" text-anchor="middle" dominant-baseline="central" fill="#993C1D">React Native · Expo · iOS / Android</text>

  <line x1="340" y1="153" x2="340" y2="167" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── Application zone ── -->
  <text class="zone" x="50" y="179" dominant-baseline="central" fill="#7F77DD">Application layer</text>
  <rect x="44" y="187" width="592" height="120" rx="8" fill="none" stroke="#7F77DD" stroke-width="0.75" stroke-dasharray="6 3"/>

  <rect x="62" y="203" width="152" height="70" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text class="title" x="138" y="231" text-anchor="middle" dominant-baseline="central" fill="#3C3489">API server</text>
  <text class="sub"   x="138" y="251" text-anchor="middle" dominant-baseline="central" fill="#534AB7">ECS Fargate · Node.js</text>

  <rect x="244" y="203" width="164" height="70" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text class="title" x="326" y="231" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Message bus</text>
  <text class="sub"   x="326" y="251" text-anchor="middle" dominant-baseline="central" fill="#534AB7">SNS · SQS · SES</text>

  <rect x="438" y="203" width="180" height="70" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text class="title" x="528" y="222" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Lambda jobs</text>
  <text class="sub"   x="528" y="241" text-anchor="middle" dominant-baseline="central" fill="#534AB7">OCR · email parse</text>
  <text class="sub"   x="528" y="258" text-anchor="middle" dominant-baseline="central" fill="#534AB7">bulk import · 24hr timer</text>

  <!-- Claude AI bar -->
  <rect x="62" y="283" width="556" height="18" rx="4" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.75"/>
  <text class="sub" x="340" y="292" text-anchor="middle" dominant-baseline="central" fill="#633806">Claude AI — Vision OCR · email parse · shopping list · AI spending assistant · Text-to-SQL · bulk OCR</text>

  <line x1="340" y1="307" x2="340" y2="321" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── Data zone ── -->
  <text class="zone" x="50" y="333" dominant-baseline="central" fill="#1D9E75">Data layer</text>
  <rect x="44" y="341" width="592" height="82" rx="8" fill="none" stroke="#1D9E75" stroke-width="0.75" stroke-dasharray="6 3"/>

  <rect x="62" y="357" width="130" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.75"/>
  <text class="title" x="127" y="377" text-anchor="middle" dominant-baseline="central" fill="#085041">PostgreSQL</text>
  <text class="sub"   x="127" y="395" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Primary DB · RLS</text>

  <rect x="210" y="357" width="104" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.75"/>
  <text class="title" x="262" y="377" text-anchor="middle" dominant-baseline="central" fill="#085041">Redis</text>
  <text class="sub"   x="262" y="395" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Cache · queues</text>

  <rect x="332" y="357" width="82" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.75"/>
  <text class="title" x="373" y="377" text-anchor="middle" dominant-baseline="central" fill="#085041">S3</text>
  <text class="sub"   x="373" y="395" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Images</text>

  <rect x="432" y="357" width="140" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.75"/>
  <text class="title" x="502" y="377" text-anchor="middle" dominant-baseline="central" fill="#085041">TimescaleDB</text>
  <text class="sub"   x="502" y="395" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Price history</text>

  <!-- Connector stubs -->
  <line x1="100" y1="444" x2="100" y2="454" stroke="#B4B2A9" stroke-width="0.75" stroke-dasharray="3 2"/>
  <line x1="260" y1="444" x2="260" y2="454" stroke="#B4B2A9" stroke-width="0.75" stroke-dasharray="3 2"/>
  <line x1="430" y1="444" x2="430" y2="454" stroke="#B4B2A9" stroke-width="0.75" stroke-dasharray="3 2"/>
  <line x1="590" y1="444" x2="590" y2="454" stroke="#B4B2A9" stroke-width="0.75" stroke-dasharray="3 2"/>

  <!-- External services label -->
  <text class="zone" x="340" y="460" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">External services</text>

  <!-- Row 1 external: Stripe, SendGrid, Apple/Firebase -->
  <rect x="28"  y="468" width="148" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.75"/>
  <text class="title" x="102" y="487" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Stripe</text>
  <text class="sub"   x="102" y="505" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Billing · Tax · local pay</text>

  <rect x="188" y="468" width="148" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.75"/>
  <text class="title" x="262" y="487" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">SendGrid</text>
  <text class="sub"   x="262" y="505" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Inbound parse · fwd email</text>

  <rect x="348" y="468" width="148" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.75"/>
  <text class="title" x="422" y="487" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Apple / Firebase</text>
  <text class="sub"   x="422" y="505" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">APNs · FCM push</text>

  <!-- Row 2 external: Plaid, Google Drive/Dropbox (new) -->
  <text class="zone" x="340" y="528" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Historical import services (new — Req 7)</text>

  <rect x="188" y="536" width="148" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text class="title" x="262" y="554" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Plaid</text>
  <text class="sub"   x="262" y="572" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Bank · card transactions</text>

  <rect x="348" y="536" width="148" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text class="title" x="422" y="554" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Drive / Dropbox</text>
  <text class="sub"   x="422" y="572" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Receipt PDF scan</text>

  <rect x="508" y="468" width="144" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.75"/>
  <text class="title" x="580" y="487" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Amazon export</text>
  <text class="sub"   x="580" y="505" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">CSV · CCPA data request</text>
</svg>