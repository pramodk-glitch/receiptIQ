<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="560" viewBox="0 0 680 560">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 14px; font-weight: 600; }
      .sub   { font-size: 11px; }
      .zone  { font-size: 11px; font-weight: 500; }
      .head  { font-size: 13px; font-weight: 600; fill: #2C2C2A; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="560" fill="#ffffff"/>

  <!-- Page title -->
  <text class="head" x="340" y="14" text-anchor="middle" dominant-baseline="central">AWS infrastructure</text>

  <!-- ── AWS outer container ── -->
  <rect x="28" y="22" width="624" height="422" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>

  <!-- ── Frontend zone ── -->
  <text class="zone" x="50" y="46" dominant-baseline="central" fill="#D85A30">User-facing layer</text>
  <rect x="44" y="54" width="592" height="100" rx="8" fill="none" stroke="#D85A30" stroke-width="0.75" stroke-dasharray="6 3"/>

  <!-- Web app -->
  <rect x="62" y="68" width="240" height="70" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.75"/>
  <text class="title" x="182" y="96" text-anchor="middle" dominant-baseline="central" fill="#712B13">Web app</text>
  <text class="sub"   x="182" y="118" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Next.js 14 · Vercel · PWA</text>

  <!-- Mobile app -->
  <rect x="378" y="68" width="240" height="70" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.75"/>
  <text class="title" x="498" y="96" text-anchor="middle" dominant-baseline="central" fill="#712B13">Mobile app</text>
  <text class="sub"   x="498" y="118" text-anchor="middle" dominant-baseline="central" fill="#993C1D">React Native · Expo · iOS / Android</text>

  <!-- Arrow between layers -->
  <line x1="340" y1="154" x2="340" y2="168" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── Application zone ── -->
  <text class="zone" x="50" y="180" dominant-baseline="central" fill="#7F77DD">Application layer</text>
  <rect x="44" y="188" width="592" height="120" rx="8" fill="none" stroke="#7F77DD" stroke-width="0.75" stroke-dasharray="6 3"/>

  <!-- API server -->
  <rect x="62" y="204" width="152" height="70" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text class="title" x="138" y="232" text-anchor="middle" dominant-baseline="central" fill="#3C3489">API server</text>
  <text class="sub"   x="138" y="252" text-anchor="middle" dominant-baseline="central" fill="#534AB7">ECS Fargate · Node.js</text>

  <!-- Message bus -->
  <rect x="244" y="204" width="164" height="70" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text class="title" x="326" y="232" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Message bus</text>
  <text class="sub"   x="326" y="252" text-anchor="middle" dominant-baseline="central" fill="#534AB7">SNS · SQS · SES</text>

  <!-- Lambda -->
  <rect x="438" y="204" width="152" height="70" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text class="title" x="514" y="228" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Lambda jobs</text>
  <text class="sub"   x="514" y="246" text-anchor="middle" dominant-baseline="central" fill="#534AB7">OCR · email parse</text>
  <text class="sub"   x="514" y="264" text-anchor="middle" dominant-baseline="central" fill="#534AB7">24hr timer</text>

  <!-- Claude AI bar -->
  <rect x="62" y="284" width="528" height="18" rx="4" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.75"/>
  <text class="sub" x="326" y="293" text-anchor="middle" dominant-baseline="central" fill="#633806">Claude AI — Vision OCR · email parse fallback · shopping list · AI spending assistant · Text-to-SQL</text>

  <!-- Arrow between layers -->
  <line x1="340" y1="308" x2="340" y2="322" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── Data zone ── -->
  <text class="zone" x="50" y="334" dominant-baseline="central" fill="#1D9E75">Data layer</text>
  <rect x="44" y="342" width="592" height="82" rx="8" fill="none" stroke="#1D9E75" stroke-width="0.75" stroke-dasharray="6 3"/>

  <!-- PostgreSQL -->
  <rect x="62" y="358" width="135" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.75"/>
  <text class="title" x="129" y="378" text-anchor="middle" dominant-baseline="central" fill="#085041">PostgreSQL</text>
  <text class="sub"   x="129" y="396" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Primary DB · RLS</text>

  <!-- Redis -->
  <rect x="215" y="358" width="104" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.75"/>
  <text class="title" x="267" y="378" text-anchor="middle" dominant-baseline="central" fill="#085041">Redis</text>
  <text class="sub"   x="267" y="396" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Cache · queues</text>

  <!-- S3 -->
  <rect x="337" y="358" width="82" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.75"/>
  <text class="title" x="378" y="378" text-anchor="middle" dominant-baseline="central" fill="#085041">S3</text>
  <text class="sub"   x="378" y="396" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Images</text>

  <!-- TimescaleDB -->
  <rect x="437" y="358" width="145" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.75"/>
  <text class="title" x="509" y="378" text-anchor="middle" dominant-baseline="central" fill="#085041">TimescaleDB</text>
  <text class="sub"   x="509" y="396" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Price history</text>

  <!-- Connector stubs to external -->
  <line x1="155" y1="444" x2="155" y2="455" stroke="#B4B2A9" stroke-width="0.75" stroke-dasharray="3 2"/>
  <line x1="340" y1="444" x2="340" y2="455" stroke="#B4B2A9" stroke-width="0.75" stroke-dasharray="3 2"/>
  <line x1="526" y1="444" x2="526" y2="455" stroke="#B4B2A9" stroke-width="0.75" stroke-dasharray="3 2"/>

  <!-- External services label -->
  <text class="zone" x="340" y="461" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">External services</text>

  <!-- Stripe -->
  <rect x="62" y="470" width="184" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.75"/>
  <text class="title" x="154" y="491" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Stripe</text>
  <text class="sub"   x="154" y="511" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Billing · Stripe Tax · local payments</text>

  <!-- SendGrid -->
  <rect x="262" y="470" width="156" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.75"/>
  <text class="title" x="340" y="491" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">SendGrid</text>
  <text class="sub"   x="340" y="511" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Inbound parse · forward email</text>

  <!-- Apple / Firebase -->
  <rect x="434" y="470" width="184" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.75"/>
  <text class="title" x="526" y="491" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Apple / Firebase</text>
  <text class="sub"   x="526" y="511" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">APNs · FCM push notifications</text>
</svg>